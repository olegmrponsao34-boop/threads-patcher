name: Build Threads IPA (Choose Frida Version)
on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: FridaGadget version
        required: true
        default: '16.5.9'
        type: choice
        options:
          - '16.5.9'
          - '17.15.5'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original IPA
        run: |
          curl -sL -o Threads_original.ipa "https://github.com/olegmrponsao34-boop/threads-patcher/releases/download/v1/Threads.ipa"
          ls -lh Threads_original.ipa

      - name: Extract IPA
        run: |
          unzip -o Threads_original.ipa -d ipa_extracted/
          ls ipa_extracted/Payload/

      - name: Download FridaGadget
        run: |
          curl -sL -o FridaGadget.dylib "https://github.com/frida/frida/releases/download/${{ github.event.inputs.frida_version }}/frida-gadget-${{ github.event.inputs.frida_version }}-ios-universal.dylib"
          file FridaGadget.dylib

      - name: Inject FridaGadget
        run: |
          APP_DIR="ipa_extracted/Payload/Threads.app"
          mkdir -p "$APP_DIR/Frameworks"
          cp FridaGadget.dylib "$APP_DIR/Frameworks/"
          chmod +x "$APP_DIR/Frameworks/FridaGadget.dylib"
          codesign -f -s - "$APP_DIR/Frameworks/FridaGadget.dylib"

          curl -sL -o /tmp/insert_dylib.zip "https://github.com/Tyilo/insert_dylib/archive/refs/heads/master.zip"
          unzip -o /tmp/insert_dylib.zip -d /tmp/
          cd /tmp/insert_dylib-master
          clang -o insert_dylib insert_dylib.c -framework CoreFoundation
          cd -
          /tmp/insert_dylib-master/insert_dylib --inplace --all-yes "@executable_path/Frameworks/FridaGadget.dylib" "$APP_DIR/Threads"

      - name: Re-sign app
        run: |
          codesign --force --deep --sign - --preserve-metadata=identifier,entitlements ipa_extracted/Payload/Threads.app

      - name: Repack IPA
        run: |
          cd ipa_extracted
          zip -r ../Threads_Frida_${{ github.event.inputs.frida_version }}.ipa Payload/
          cd ..
          ls -lh Threads_Frida_${{ github.event.inputs.frida_version }}.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Threads_Frida_${{ github.event.inputs.frida_version }}
          path: Threads_Frida_${{ github.event.inputs.frida_version }}.ipa

      - name: Create GitHub Release
        run: |
          gh release create v2 --repo olegmrponsao34-boop/threads-patcher --title "Threads + FridaGadget ${{ github.event.inputs.frida_version }}" --notes "Patched IPA" 2>/dev/null || true
          gh release upload v2 --repo olegmrponsao34-boop/threads-patcher Threads_Frida_${{ github.event.inputs.frida_version }}.ipa --clobber 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
