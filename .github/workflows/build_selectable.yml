name: Build Threads IPA (Choose Frida Version)
on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'FridaGadget version'
        required: true
        default: '16.5.9'
        type: choice
        options:
          - '16.5.9'
          - '17.15.5'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install pipx
          pipx ensurepath
          pipx install ipatool

      - name: Authenticate ipatool
        run: |
          echo "No auth needed for free download"
          # ipatool auth login --email "bharathjain1984@gmail.com" --password "$APPLE_PASSWORD"

      - name: Download Threads IPA via ipatool
        run: |
          ipatool download --bundle-identifier com.instagram.threads -o Threads_original.ipa || \
          curl -sL -o Threads_original.ipa "https://github.com/olegmrponsao34-boop/threads-patcher/releases/download/v1/Threads.ipa"
          ls -lh Threads_original.ipa

      - name: Extract IPA
        run: |
          unzip -o Threads_original.ipa -d ipa_extracted/
          ls ipa_extracted/Payload/

      - name: Download FridaGadget ${{ github.event.inputs.frida_version }}
        run: |
          FRIDA_VER="${{ github.event.inputs.frida_version }}"
          curl -sL -o FridaGadget.dylib "https://github.com/frida/frida/releases/download/${FRIDA_VER}/frida-gadget-${FRIDA_VER}-ios-universal.dylib"
          file FridaGadget.dylib

      - name: Inject FridaGadget
        run: |
          APP_DIR="ipa_extracted/Payload/Threads.app"
          
          # Create Frameworks dir and copy
          mkdir -p "$APP_DIR/Frameworks"
          cp FridaGadget.dylib "$APP_DIR/Frameworks/"
          chmod +x "$APP_DIR/Frameworks/FridaGadget.dylib"
          
          # Sign dylib
          codesign -f -s - "$APP_DIR/Frameworks/FridaGadget.dylib"
          
          # Inject into binary using insert_dylib
          git clone https://github.com/Tyilo/insert_dylib.git /tmp/insert_dylib
          cd /tmp/insert_dylib
          clang -o insert_dylib insert_dylib.c 2>/dev/null || xcodebuild -project insert_dylib.xcodeproj -scheme insert_dylib -configuration Release SYMROOT=/tmp/build 2>/dev/null
          sudo cp insert_dylib /usr/local/bin/ 2>/dev/null || true
          cd -
          
          insert_dylib --inplace --all-yes "@executable_path/Frameworks/FridaGadget.dylib" "$APP_DIR/Threads" 2>&1 || {
            echo "Trying backup method..."
            # Manual LC_LOAD_DYLIB insertion via Python
            python3 -c "
import struct, os
binary = open('$APP_DIR/Threads', 'rb').read()
# Simple check - already contains reference?
if b'FridaGadget' in binary:
    print('FridaGadget already injected')
else:
    print('Binary does not have FridaGadget - insert_dylib failed')
"
          }

      - name: Re-sign app
        run: |
          codesign --force --deep --sign - --preserve-metadata=identifier,entitlements ipa_extracted/Payload/Threads.app

      - name: Repack IPA
        run: |
          cd ipa_extracted
          zip -r ../Threads_Frida_${{ github.event.inputs.frida_version }}.ipa Payload/
          cd ..
          ls -lh Threads_Frida_${{ github.event.inputs.frida_version }}.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Threads_Frida_${{ github.event.inputs.frida_version }}
          path: Threads_Frida_${{ github.event.inputs.frida_version }}.ipa

      - name: Create GitHub Release (v2)
        run: |
          gh release create v2 --repo olegmrponsao34-boop/threads-patcher --title "Threads + FridaGadget ${{ github.event.inputs.frida_version }}" --notes "Patched IPA for iOS SSL pinning bypass" 2>/dev/null || true
          gh release upload v2 --repo olegmrponsao34-boop/threads-patcher Threads_Frida_${{ github.event.inputs.frida_version }}.ipa --clobber 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
