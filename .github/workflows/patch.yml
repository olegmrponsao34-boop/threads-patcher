name: Patch Threads IPA
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  patch:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: |
          pip install frida-tools objection
          npm install -g applesign

      - name: Compile insert_dylib
        run: |
          git clone https://github.com/Tyilo/insert_dylib /tmp/insert_dylib
          cd /tmp/insert_dylib
          xcodebuild -project insert_dylib.xcodeproj -scheme insert_dylib -configuration Release SYMROOT=/tmp/build
          cp /tmp/build/Release/insert_dylib /usr/local/bin/insert_dylib
          insert_dylib --help

      - name: Download IPA from release
        run: |
          gh release download v1 --repo olegmrponsao34-boop/threads-patcher --pattern "*.ipa"
          echo "IPA_NAME=$(ls *.ipa | head -1)" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Patch with Objection
        run: |
          objection patchipa --source "${{ env.IPA_NAME }}" --codesign-signature "-"
          echo "PATCHED_FILE=$(ls *-frida-codesigned.ipa *-patched.ipa 2>/dev/null | grep -v '${{ env.IPA_NAME }}' | head -1)" >> $GITHUB_ENV

      - name: Upload patched IPA
        uses: actions/upload-artifact@v4
        with:
          name: Threads-Patched
          path: "*-frida-codesigned.ipa"

      - name: Upload to release
        run: |
          gh release upload v1 --repo olegmrponsao34-boop/threads-patcher *-frida-codesigned.ipa --clobber
        env:
          GH_TOKEN: ${{ github.token }}

