name: Patch Threads IPA
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  patch:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install frida-tools objection
          npm install -g applesign
          brew install xz
          git clone https://github.com/Tyilo/insert_dylib /tmp/insert_dylib
          cd /tmp/insert_dylib && xcodebuild && cp build/Release/insert_dylib /usr/local/bin/insert_dylib

      - name: Download IPA from release
        run: |
          gh release download v1 --repo olegmrponsao34-boop/threads-patcher --pattern "*.ipa"
          IPA_FILE=$(ls *.ipa 2>/dev/null | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "Error: No .ipa file found in release"
            exit 1
          fi
          echo "IPA_NAME=$IPA_FILE" >> $GITHUB_ENV
          echo "Found: $IPA_FILE"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Patch with Objection
        run: |
          objection patchipa --source "${{ env.IPA_NAME }}" --codesign-signature "-" 2>&1 || true
          PATCHED=$(ls *-frida-codesigned.ipa 2>/dev/null | head -1)
          if [ -z "$PATCHED" ]; then
            PATCHED=$(ls *-patched.ipa 2>/dev/null | head -1)
          fi
          if [ -z "$PATCHED" ]; then
            PATCHED=$(ls *.ipa 2>/dev/null | grep -v "${{ env.IPA_NAME }}" | head -1)
          fi
          if [ -z "$PATCHED" ]; then
            # Manual fallback: find any ipa in temp or work dir
            PATCHED=$(find /tmp -name "*.ipa" -newer "${{ env.IPA_NAME }}" 2>/dev/null | head -1)
          fi
          echo "PATCHED_FILE=$PATCHED" >> $GITHUB_ENV
          echo "Patched file: $PATCHED"

      - name: Upload patched IPA
        uses: actions/upload-artifact@v4
        if: env.PATCHED_FILE != ''
        with:
          name: Threads-Patched
          path: ${{ env.PATCHED_FILE }}

      - name: Upload patched IPA to release
        if: env.PATCHED_FILE != ''
        run: |
          gh release upload v1 --repo olegmrponsao34-boop/threads-patcher "${{ env.PATCHED_FILE }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Debug - list all files
        if: failure()
        run: |
          echo "=== Working dir ==="
          ls -la
          echo "=== Temp ==="
          ls -la /tmp/ 2>/dev/null | head -20
          echo "=== Home objection ==="
          ls -la ~/.objection/ 2>/dev/null
